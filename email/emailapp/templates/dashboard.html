{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>AI Email Reply Generator</title>
    <!-- Google Font -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">
    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            font-family:'Poppins',sans-serif;
            min-height:100vh;
            overflow-x:hidden;
            position:relative;
            background:
            linear-gradient(
                135deg,
                #020617,
                #0f172a,
                #111827
            );
            color:white;
        }
        /* Grid Background */
        body::before{
            content:"";
            position:absolute;
            width:100%;
            height:100%;
            background-image:
            linear-gradient(
                rgba(255,255,255,0.04) 1px,
                transparent 1px
            ),
            linear-gradient(
                90deg,
                rgba(255,255,255,0.04) 1px,
                transparent 1px
            );
            background-size:40px 40px;
            z-index:0;
        }
        /* Glow Effects */
        .glow1{
            position:absolute;
            width:350px;
            height:350px;
            background:#2563eb;
            border-radius:50%;
            top:-120px;
            left:-100px;
            filter:blur(120px);
            opacity:0.35;
        }
        .glow2{
            position:absolute;
            width:300px;
            height:300px;
            background:#06b6d4;
            border-radius:50%;
            bottom:-100px;
            right:-100px;
            filter:blur(120px);
            opacity:0.35;
        }
        /* Navbar */
        .navbar{
            position:relative;
            z-index:1;
            width:100%;
            padding:20px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:rgba(15,23,42,0.75);
            backdrop-filter:blur(18px);
            border-bottom:
            1px solid rgba(255,255,255,0.08);
        }
        .logo{
            display:flex;
            align-items:center;
            gap:15px;
            font-size:24px;
            font-weight:700;
        }
        .logo img{
            width:55px;
            height:55px;
            object-fit:cover;
            border-radius:14px;
            padding:6px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.10);
        }
        .nav-links{
            display:flex;
            gap:25px;
        }
        .nav-links a{
            color:#e2e8f0;
            text-decoration:none;
            font-size:15px;
            font-weight:500;
            transition:0.3s;
        }
        .nav-links a:hover{
            color:#38bdf8;
        }
        /* Main Container */
        .container{
            position:relative;
            z-index:1;
            width:75%;
            max-width:950px;
            margin:50px auto;
            padding:45px;
            border-radius:28px;
            background:rgba(15,23,42,0.78);
            border:1px solid rgba(255,255,255,0.10);
            backdrop-filter:blur(18px);
            box-shadow:
            0 10px 40px rgba(0,0,0,0.45);
            animation:fadeIn 0.8s ease;
        }
        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
        .title{
            text-align:center;
            font-size:40px;
            font-weight:700;
            margin-bottom:10px;
        }
        .subtitle{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:40px;
            font-size:15px;
            line-height:1.7;
        }
        /* Labels */
        label{
            display:block;
            margin-bottom:12px;
            font-size:16px;
            font-weight:500;
            color:#f1f5f9;
        }
        /* Inputs */
        textarea,
        select{
            width:100%;
            padding:18px;
            border:none;
            outline:none;
            border-radius:16px;
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.08);
            color:white;
            font-size:15px;
            margin-bottom:28px;
            transition:0.3s;
        }
        textarea{
            resize:vertical;
            min-height:220px;
        }
        textarea::placeholder{
            color:#94a3b8;
        }
        textarea:focus,
        select:focus{
            border:1px solid #38bdf8;
            background:rgba(255,255,255,0.10);
            box-shadow:
            0 0 15px rgba(56,189,248,0.30);
        }
        option{
            color:black;
        }
        /* Generate Button */
        button{
            width:100%;
            padding:17px;
            border:none;
            border-radius:16px;
            background:
            linear-gradient(
                135deg,
                #2563eb,
                #06b6d4
            );
            color:white;
            font-size:18px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }
        button:hover{
            transform:translateY(-3px);
            box-shadow:
            0 12px 25px rgba(37,99,235,0.45);
        }
        /* Reply Section */
        .reply-section{
            margin-top:45px;
        }
        .reply-title{
            margin-bottom:18px;
            font-size:28px;
            font-weight:600;
        }
        .reply-box{
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:18px;
            padding:20px;
        }
        .reply-box textarea{
            min-height:280px;
            margin-bottom:0;
        }
        /* Buttons */
        .button-group{
            display:flex;
            gap:20px;
            margin-top:25px;
            flex-wrap:wrap;
        }
        .history-btn,
        .copy-btn{
            flex:1;
            text-align:center;
            padding:15px;
            border:none;
            border-radius:14px;
            text-decoration:none;
            color:white;
            font-weight:600;
            transition:0.3s;
            cursor:pointer;
        }
        .history-btn{
            background:
            linear-gradient(
                135deg,
                #10b981,
                #84cc16
            );
        }
        .copy-btn{
            background:
            linear-gradient(
                135deg,
                #f59e0b,
                #ef4444
            );
        }
        .history-btn:hover,
        .copy-btn:hover{
            transform:translateY(-3px);
        }
        /* Footer */
        .footer{
            text-align:center;
            margin-top:45px;
            color:#cbd5e1;
            font-size:14px;
        }
        /* Responsive */
        @media(max-width:768px){
            .container{
                width:92%;
                padding:28px;
            }
            .navbar{
                flex-direction:column;
                gap:15px;
                text-align:center;
            }
            .button-group{
                flex-direction:column;
            }
            .title{
                font-size:30px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Glow -->
    <div class="glow1"></div>
    <div class="glow2"></div>
    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">
            <img
                src="{% static 'image.jpg' %}"
                alt="AI Logo"
            >
            <span>
                AI Email Generator
            </span>
        </div>
        <div class="nav-links">
            <a href="{% url 'history' %}">
                History
            </a>
            <a href="{% url 'logout' %}">
                Logout
            </a>
        </div>
    </div>
    <!-- Main Container -->
    <div class="container">
        <h1 class="title">
            AI Email Reply Generator
        </h1>
        <p class="subtitle">
            Generate smart, professional, and AI-powered email replies instantly
        </p>
        <!-- Form -->
        <form method="POST">
            {% csrf_token %}
            <!-- Email Input -->
            <label>
                Paste Received Email
            </label>
            <textarea
                name="email"
                rows="10"
                placeholder="Paste your received email here..."
                required></textarea>
            <!-- Tone -->
            <label>
                Select Reply Tone
            </label>
            <select name="tone">
                <option value="Professional">
                    Professional
                </option>
                <option value="Friendly">
                    Friendly
                </option>
                <option value="Formal">
                    Formal
                </option>
                <option value="Apology">
                    Apology
                </option>
                <option value="Thank You">
                    Thank You
                </option>
                <option value="Short Reply">
                    Short Reply
                </option>
                <option value="Business">
                    Business
                </option>
            </select>
            <!-- Button -->
            <button type="submit">
                Generate AI Reply
            </button>
        </form>
        <!-- Reply Section -->
        {% if reply %}
        <div class="reply-section">
            <h2 class="reply-title">
                Generated Reply
            </h2>
            <div class="reply-box">
                <textarea
                    id="replyText"
                    readonly>{{ reply }}</textarea>
            </div>
            <div class="button-group">
                <button
                    class="copy-btn"
                    onclick="copyReply()">
                    Copy Reply
                </button>
            </div>
        </div>
        {% endif %}
        <!-- Extra Buttons -->
        <div class="button-group">
            <a href="{% url 'history' %}"
               class="history-btn">
                View Saved Replies
            </a>
        </div>
        <!-- Footer -->
        <div class="footer">
            <p>
                AI Email Reply Generator
            </p>
        </div>
    </div>
    <!-- JavaScript -->
    <script>
        function copyReply(){
            let replyText =
                document.getElementById("replyText");
            replyText.select();
            document.execCommand("copy");
            alert("Reply copied successfully!");
        }
    </script>
</body>
</html>
