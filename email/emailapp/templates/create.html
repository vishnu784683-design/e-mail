{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Create Email Reply</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            font-family: Arial, sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),
            url("{% static 'image.jpg' %}");
            background-size:cover;
            background-position:center;
            padding:20px;
        }
        .container{
            width:100%;
            max-width:700px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);
            padding:35px;
            border-radius:20px;
            box-shadow:
            0 8px 25px rgba(0,0,0,0.4);
            color:white;
        }
        h1{
            text-align:center;
            margin-bottom:25px;
            font-size:32px;
        }
        label{
            display:block;
            margin-bottom:8px;
            margin-top:15px;
            font-weight:bold;
        }
        textarea,
        input,
        select{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            outline:none;
            margin-bottom:10px;
            font-size:15px;
            background:rgba(255,255,255,0.18);
            color:white;
        }
        textarea{
            min-height:180px;
            resize:vertical;
        }
        textarea::placeholder,
        input::placeholder{
            color:#ddd;
        }
        textarea:focus,
        input:focus,
        select:focus{
            border:2px solid #38bdf8;
        }
        button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:12px;
            background:
            linear-gradient(
                135deg,
                #2563eb,
                #06b6d4
            );
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }
        button:hover{
            transform:translateY(-3px);
            box-shadow:
            0 8px 20px rgba(37,99,235,0.5);
        }
        .history-link{
            text-align:center;
            margin-top:20px;
        }
        .history-link a{
            color:#fff;
            text-decoration:none;
            font-weight:bold;
        }
        .history-link a:hover{
            color:#38bdf8;
        }
        @media(max-width:768px){
            .container{
                padding:25px;
            }
            h1{
                font-size:26px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🤖 AI Email Reply Generator</h1>
    <form method="POST">
        {% csrf_token %}
        <label>Received Email</label>
        {{ form.received_email }}
        <label>Select Tone</label>
        {{ form.tone }}
        <label>Generated Reply</label>
        {{ form.generated_reply }}
        <button type="submit">
            ✨ Save Reply
        </button>
    </form>
    <div class="history-link">
        <a href="{% url 'history' %}">
            📜 View History
        </a>
    </div>
</div>
</body>
</html>
