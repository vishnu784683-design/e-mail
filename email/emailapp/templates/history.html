{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Email Reply Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            min-height:100vh;
            position:relative;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:40px 20px;

            color:white;

            background:linear-gradient(135deg,#020617,#0f172a,#111827);
            overflow-y:auto;
        }

        /* Grid background */
        body::before{
            content:"";
            position:absolute;
            width:100%;
            height:100%;

            background-image:
                linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),
                linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);

            background-size:40px 40px;
            z-index:0;
        }

        /* Glow */
        .glow1{
            position:absolute;
            width:350px;
            height:350px;
            background:#2563eb;
            border-radius:50%;
            top:-120px;
            left:-100px;
            filter:blur(120px);
            opacity:0.35;
        }

        .glow2{
            position:absolute;
            width:300px;
            height:300px;
            background:#06b6d4;
            border-radius:50%;
            bottom:-100px;
            right:-100px;
            filter:blur(120px);
            opacity:0.35;
        }

        /* Container */
        .container{

            position:relative;
            z-index:1;

            width:100%;
            max-width:850px;

            padding:45px;

            border-radius:28px;

            background:rgba(15,23,42,0.78);
            border:1px solid rgba(255,255,255,0.10);

            backdrop-filter:blur(18px);

            box-shadow:0 10px 40px rgba(0,0,0,0.45);

            animation:fadeIn 0.8s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h1{
            text-align:center;
            font-size:34px;
            margin-bottom:10px;
            font-weight:700;
        }

        .subtitle{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:30px;
            font-size:14px;
        }

        label{
            display:block;
            margin-bottom:10px;
            font-size:14px;
            color:#e2e8f0;
            font-weight:500;
        }

        textarea,
        input,
        select{

            width:100%;
            padding:16px;

            border-radius:16px;

            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.08);

            color:white;

            font-size:15px;

            outline:none;

            transition:0.3s;
            margin-bottom:20px;
        }

        textarea{
            min-height:160px;
            resize:vertical;
        }

        textarea:focus,
        input:focus,
        select:focus{

            border:1px solid #38bdf8;
            background:rgba(255,255,255,0.10);

            box-shadow:0 0 15px rgba(56,189,248,0.25);
        }

        ::placeholder{
            color:#cbd5e1;
        }

        button{

            width:100%;
            padding:16px;

            border:none;
            border-radius:16px;

            background:linear-gradient(135deg,#10b981,#059669);

            color:white;

            font-size:16px;
            font-weight:600;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 12px 25px rgba(16,185,129,0.35);
        }

        .history-link{

            display:block;
            text-align:center;

            margin-top:25px;

            color:#cbd5e1;
            text-decoration:none;

            font-size:14px;

            transition:0.3s;
        }

        .history-link:hover{
            color:#38bdf8;
        }

        @media(max-width:768px){
            .container{
                padding:30px;
            }

            h1{
                font-size:26px;
            }
        }

    </style>
</head>

<body>

    <div class="glow1"></div>
    <div class="glow2"></div>

    <div class="container">

        <h1>🤖 AI Email Reply Generator</h1>
        <p class="subtitle">Generate and manage smart AI-powered email replies</p>

        <form method="POST">
            {% csrf_token %}

            <label for="id_received_email">Received Email</label>
            {{ form.received_email }}

            <label for="id_tone">Select Tone</label>
            {{ form.tone }}

            <label for="id_generated_reply">Generated Reply</label>
            {{ form.generated_reply }}

            <button type="submit">✨ Generate & Save Reply</button>
        </form>

        <a href="{% url 'history' %}" class="history-link">
            📜 View Reply History
        </a>

    </div>

</body>

</html>
