{% load static %}
<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Update AI Reply</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            min-height:100vh;

            position:relative;

            overflow-y:auto;

            background:
            linear-gradient(
                135deg,
                #020617,
                #0f172a,
                #111827
            );

            display:flex;

            justify-content:center;

            align-items:center;

            padding:40px 20px;

            color:white;
        }

        /* Grid Background */

        body::before{

            content:"";

            position:absolute;

            width:100%;

            height:100%;

            background-image:
            linear-gradient(
                rgba(255,255,255,0.04) 1px,
                transparent 1px
            ),
            linear-gradient(
                90deg,
                rgba(255,255,255,0.04) 1px,
                transparent 1px
            );

            background-size:40px 40px;

            z-index:0;
        }

        /* Glow Effects */

        .glow1{

            position:absolute;

            width:350px;

            height:350px;

            background:#2563eb;

            border-radius:50%;

            top:-120px;

            left:-100px;

            filter:blur(120px);

            opacity:0.35;
        }

        .glow2{

            position:absolute;

            width:300px;

            height:300px;

            background:#06b6d4;

            border-radius:50%;

            bottom:-100px;

            right:-100px;

            filter:blur(120px);

            opacity:0.35;
        }

        /* Container */

        .container{

            position:relative;

            z-index:1;

            width:100%;

            max-width:850px;

            padding:45px;

            border-radius:28px;

            background:rgba(15,23,42,0.78);

            border:1px solid rgba(255,255,255,0.10);

            backdrop-filter:blur(18px);

            box-shadow:
            0 10px 40px rgba(0,0,0,0.45);

            animation:fadeIn 0.8s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* Logo */

        .logo{

            display:flex;

            justify-content:center;

            margin-bottom:20px;
        }

        .logo img{

            width:90px;

            height:90px;

            object-fit:cover;

            border-radius:22px;

            padding:10px;

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.12);

            box-shadow:
            0 10px 30px rgba(0,0,0,0.45);
        }

        /* Heading */

        h1{

            text-align:center;

            font-size:36px;

            margin-bottom:10px;

            font-weight:700;
        }

        .subtitle{

            text-align:center;

            color:#cbd5e1;

            margin-bottom:35px;

            font-size:15px;

            line-height:1.7;
        }

        /* Form */

        form{

            margin-top:20px;
        }

        form p{

            margin-bottom:22px;
        }

        label{

            display:block;

            margin-bottom:10px;

            color:#f1f5f9;

            font-size:15px;

            font-weight:500;
        }

        textarea,
        input,
        select{

            width:100%;

            padding:18px;

            border:none;

            outline:none;

            border-radius:16px;

            background:rgba(255,255,255,0.06);

            border:1px solid rgba(255,255,255,0.08);

            color:white;

            font-size:15px;

            transition:0.3s;
        }

        textarea{

            min-height:220px;

            resize:vertical;
        }

        textarea:focus,
        input:focus,
        select:focus{

            border:1px solid #38bdf8;

            background:rgba(255,255,255,0.10);

            box-shadow:
            0 0 15px rgba(56,189,248,0.30);
        }

        /* Placeholder */

        ::placeholder{

            color:#cbd5e1;
        }

        /* Button */

        button{

            width:100%;

            padding:17px;

            border:none;

            border-radius:16px;

            background:
            linear-gradient(
                135deg,
                #10b981,
                #059669
            );

            color:white;

            font-size:18px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            transform:translateY(-3px);

            box-shadow:
            0 12px 25px rgba(16,185,129,0.35);
        }

        /* Back Button */

        .back-btn{

            margin-top:20px;

            text-align:center;
        }

        .back-btn a{

            text-decoration:none;

            color:#cbd5e1;

            font-size:14px;

            transition:0.3s;
        }

        .back-btn a:hover{

            color:#38bdf8;
        }

        /* Responsive */

        @media(max-width:768px){

            .container{

                padding:30px;
            }

            h1{

                font-size:28px;
            }

            .logo img{

                width:75px;

                height:75px;
            }
        }

    </style>

</head>

<body>

    <!-- Glow Effects -->

    <div class="glow1"></div>

    <div class="glow2"></div>

    <!-- Main Container -->

    <div class="container">

        <!-- Logo -->

        <div class="logo">

            <img
                src="{% static 'image.jpg' %}"
                alt="AI Logo"
            >

        </div>

        <!-- Heading -->

        <h1>Update Email Reply</h1>

        <p class="subtitle">
            Modify and improve your AI generated email reply professionally
        </p>

        <!-- Form -->

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">

                ✨ Update Reply

            </button>

        </form>

        <!-- Back Button -->

        <div class="back-btn">

            <a href="{% url 'register' %}">

                ← Back To Dashboard

            </a>

        </div>

    </div>

</body>

</html>
