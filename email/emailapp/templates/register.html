{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Register Page</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            overflow:hidden;

            position:relative;

            background:
            linear-gradient(
                135deg,
                #020617,
                #0f172a,
                #111827
            );
        }

        /* Grid Background */

        body::before{

            content:"";

            position:absolute;

            width:100%;

            height:100%;

            background-image:
            linear-gradient(
                rgba(255,255,255,0.04) 1px,
                transparent 1px
            ),
            linear-gradient(
                90deg,
                rgba(255,255,255,0.04) 1px,
                transparent 1px
            );

            background-size:40px 40px;

            z-index:0;
        }

        /* Glow Effects */

        .glow1{

            position:absolute;

            width:350px;

            height:350px;

            background:#2563eb;

            border-radius:50%;

            top:-120px;

            left:-100px;

            filter:blur(120px);

            opacity:0.35;
        }

        .glow2{

            position:absolute;

            width:300px;

            height:300px;

            background:#06b6d4;

            border-radius:50%;

            bottom:-100px;

            right:-100px;

            filter:blur(120px);

            opacity:0.35;
        }

        /* Register Card */

        .container{

            position:relative;

            z-index:1;

            width:440px;

            padding:50px 40px;

            border-radius:28px;

            background:rgba(15,23,42,0.75);

            border:1px solid rgba(255,255,255,0.10);

            backdrop-filter:blur(18px);

            box-shadow:
            0 10px 40px rgba(0,0,0,0.45);

            color:white;

            animation:fadeIn 0.8s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* Logo */

        .logo{

            display:flex;

            justify-content:center;

            align-items:center;

            margin-bottom:25px;
        }

        .logo img{

            width:100px;

            height:100px;

            object-fit:cover;

            border-radius:24px;

            padding:10px;

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.12);

            box-shadow:
            0 10px 30px rgba(0,0,0,0.45);
        }

        /* Heading */

        h1{

            text-align:center;

            font-size:34px;

            margin-bottom:10px;

            font-weight:700;
        }

        .subtitle{

            text-align:center;

            color:#cbd5e1;

            margin-bottom:35px;

            font-size:14px;

            line-height:1.7;
        }

        /* Input */

        .input-group{

            margin-bottom:22px;
        }

        .input-group label{

            display:block;

            margin-bottom:10px;

            color:#e2e8f0;

            font-size:14px;
        }

        .input-group input{

            width:100%;

            padding:16px;

            border:none;

            outline:none;

            border-radius:15px;

            background:rgba(255,255,255,0.06);

            color:white;

            font-size:15px;

            border:1px solid rgba(255,255,255,0.08);

            transition:0.3s;
        }

        .input-group input::placeholder{

            color:#94a3b8;
        }

        .input-group input:focus{

            border:1px solid #38bdf8;

            background:rgba(255,255,255,0.10);

            box-shadow:
            0 0 15px rgba(56,189,248,0.35);
        }

        /* Button */

        button{

            width:100%;

            padding:16px;

            border:none;

            border-radius:15px;

            background:
            linear-gradient(
                135deg,
                #2563eb,
                #06b6d4
            );

            color:white;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            transform:translateY(-3px);

            box-shadow:
            0 12px 25px rgba(37,99,235,0.45);
        }

        /* Login */

        .login{

            margin-top:30px;

            text-align:center;

            font-size:14px;

            color:#cbd5e1;
        }

        .login a{

            color:#38bdf8;

            text-decoration:none;

            font-weight:600;
        }

        .login a:hover{

            text-decoration:underline;
        }

        /* Mobile */

        @media(max-width:500px){

            .container{

                width:92%;

                padding:40px 25px;
            }

            h1{
                font-size:28px;
            }
        }

    </style>

</head>

<body>

    <!-- Background Glow -->

    <div class="glow1"></div>

    <div class="glow2"></div>

    <!-- Register Container -->

    <div class="container">

        <!-- Logo -->

        <div class="logo">

            <img
                src="{% static 'image.jpg' %}"
                alt="AI Logo"
            >

        </div>

        <!-- Heading -->

        <h1>Create Account</h1>

        <p class="subtitle">
            Register to access your AI Email Reply Dashboard
        </p>

        <!-- Register Form -->

        <form method="POST">

            {% csrf_token %}

            <!-- Username -->

            <div class="input-group">

                <label>Username</label>

                <input
                    type="text"
                    name="username"
                    placeholder="Enter your username"
                    required
                >

            </div>

            <!-- Email -->

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >

            </div>

            <!-- Password -->

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >

            </div>

            <!-- Button -->

            <button type="submit">

                Create Account

            </button>

        </form>

        <!-- Login -->

        <div class="login">

            Already have an account?

            <a href="{% url 'login' %}">
                Login
            </a>

        </div>

    </div>

</body>
</html>
